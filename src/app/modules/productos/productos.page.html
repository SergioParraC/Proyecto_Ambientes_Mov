<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">productos</ion-title>
    </ion-toolbar>
  </ion-header>
  <h5>{{ mensajeObtenido }}</h5>
  <app-add-product (eventoMensaje)="recibirMensaje($event)"></app-add-product>
  <app-show-products [productosComponente] = productosPagina></app-show-products>
</ion-content>
